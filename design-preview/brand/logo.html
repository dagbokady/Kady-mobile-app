<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kady — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(160deg, #ffffff 0%, #faf7fe 60%, #f6f2fb 100%);
    min-height: 100vh;
    padding: 40px 32px;
    color: #211633;
  }
  h1 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6E6A7D; margin-bottom: 36px; }
  .section-title { font-weight: 600; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: #6E6A7D; margin-bottom: 20px; margin-top: 32px; }
  .section-title:first-of-type { margin-top: 0; }
  .variants { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
  .variant { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .variant-bg { display: flex; align-items: center; justify-content: center; border-radius: 24px; padding: 24px; }
  .label { font-size: 11px; font-weight: 600; color: #6E6A7D; }
  .wordmark {
    font-family: 'Sora', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
  }
  .lockup { display: flex; align-items: center; gap: 14px; }
</style>
</head>
<body>
  <h1>Logo &amp; Wordmark</h1>
  <p class="subtitle">Symbole : deux anneaux entrelacés — le lien, l'infini.</p>

  <div class="section-title">Symbole seul</div>
  <div class="variants">
    <div class="variant">
      <div class="variant-bg" style="background:#FFFFFF; border:1px solid rgba(33,22,51,0.08); width:120px; height:120px;">
        <svg width="72" height="72" viewBox="0 0 100 100">
          <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
          <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
        </svg>
      </div>
      <div class="label">Fond blanc</div>
    </div>
    <div class="variant">
      <div class="variant-bg" style="background:linear-gradient(135deg,#ff6aa9,#e02a73); width:120px; height:120px;">
        <svg width="72" height="72" viewBox="0 0 100 100">
          <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#fff" stroke-width="11" transform="rotate(45 40 50)"/>
          <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#fff" stroke-width="11" transform="rotate(45 60 50)"/>
        </svg>
      </div>
      <div class="label">Fond dégradé</div>
    </div>
    <div class="variant">
      <div class="variant-bg" style="background:#211633; width:120px; height:120px;">
        <svg width="72" height="72" viewBox="0 0 100 100">
          <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#ff6aa9" stroke-width="11" transform="rotate(45 40 50)"/>
          <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#ff6aa9" stroke-width="11" transform="rotate(45 60 50)"/>
        </svg>
      </div>
      <div class="label">Fond sombre</div>
    </div>
  </div>

  <div class="section-title">Lockup (symbole + wordmark)</div>
  <div class="variants">
    <div class="variant">
      <div class="variant-bg" style="background:#FFFFFF; border:1px solid rgba(33,22,51,0.08);">
        <div class="lockup">
          <svg width="44" height="44" viewBox="0 0 100 100">
            <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
            <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
          </svg>
          <span class="wordmark" style="background:linear-gradient(90deg,#ff6aa9,#e02a73);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">KADY</span>
        </div>
      </div>
      <div class="label">Horizontal · fond blanc</div>
    </div>
    <div class="variant">
      <div class="variant-bg" style="background:linear-gradient(160deg,#ffffff,#faf7fe,#f6f2fb);">
        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
          <svg width="52" height="52" viewBox="0 0 100 100">
            <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
            <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
          </svg>
          <span class="wordmark" style="background:linear-gradient(90deg,#ff6aa9,#e02a73);-webkit-background-clip:text;-webkit-text-fill-color:transparent; font-size:20px;">KADY</span>
        </div>
      </div>
      <div class="label">Vertical · fond lavande</div>
    </div>
  </div>

  <div class="section-title">Tailles</div>
  <div style="display:flex; flex-wrap:wrap; gap:24px; align-items:flex-end;">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <svg width="24" height="24" viewBox="0 0 100 100">
        <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
        <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
      </svg>
      <span style="font-size:11px;color:#6E6A7D">24px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <svg width="40" height="40" viewBox="0 0 100 100">
        <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
        <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
      </svg>
      <span style="font-size:11px;color:#6E6A7D">40px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <svg width="64" height="64" viewBox="0 0 100 100">
        <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
        <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
      </svg>
      <span style="font-size:11px;color:#6E6A7D">64px</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
      <svg width="96" height="96" viewBox="0 0 100 100">
        <rect x="20" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 40 50)"/>
        <rect x="40" y="30" width="40" height="40" rx="13" fill="none" stroke="#d6286e" stroke-width="11" transform="rotate(45 60 50)"/>
      </svg>
      <span style="font-size:11px;color:#6E6A7D">96px (défaut)</span>
    </div>
  </div>
</body>
</html>
