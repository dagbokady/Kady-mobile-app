<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kady — LevelDots &amp; AgeRange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(160deg, #ffffff 0%, #faf7fe 60%, #f6f2fb 100%);
    min-height: 100vh; padding: 40px 32px; color: #211633;
  }
  h1 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6E6A7D; margin-bottom: 36px; }
  .section-title { font-weight: 600; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: #6E6A7D; margin-bottom: 16px; margin-top: 28px; }
  .section-title:first-of-type { margin-top: 0; }
  .card { background: #fff; border-radius: 18px; border: 1px solid rgba(33,22,51,0.08); padding: 16px; box-shadow: 0 2px 14px rgba(0,0,0,0.07); }

  /* LevelDots */
  .dots-row { display: flex; flex-direction: column; gap: 16px; }
  .level-row-outer { display: flex; align-items: center; gap: 14px; }
  .dots { display: flex; align-items: center; }
  .dot { width: 11px; height: 11px; border-radius: 6px; border: 1px solid; }
  .dot-on { background: var(--accent); border-color: var(--accent); }
  .dot-off { background: rgba(33,22,51,0.08); border-color: rgba(33,22,51,0.12); }
  .bar { flex: 0 0 20px; height: 2px; margin: 0 2px; }
  .bar-on { background: var(--accent); }
  .bar-off { background: rgba(33,22,51,0.08); }
  .level-lbl { font-size: 12px; font-weight: 500; margin-top: 6px; }
  .level-name { font-size: 12px; color: #6E6A7D; font-weight: 500; }

  /* AgeRange */
  .age-card { background: #fff; border-radius: 18px; border: 1px solid rgba(33,22,51,0.08); padding: 16px; max-width: 320px; }
  .age-values { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; }
  .stepper { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 9px; }
  .step-label { font-size: 11.5px; font-weight: 600; color: rgba(33,22,51,0.55); }
  .step-row { display: flex; align-items: center; gap: 12px; }
  .step-btn { width: 34px; height: 34px; border-radius: 12px; background: rgba(255,106,169,0.12); border: 1px solid rgba(255,140,190,0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .step-val { font-family: 'Sora', sans-serif; font-size: 24px; color: #211633; min-width: 38px; text-align: center; }
  .sep { padding-bottom: 14px; color: rgba(33,22,51,0.3); }
  .track-wrap { position: relative; height: 8px; border-radius: 99px; background: rgba(33,22,51,0.10); margin-bottom: 12px; }
  .track-fill { position: absolute; top: 0; height: 8px; border-radius: 99px; background: linear-gradient(90deg,#ff6aa9,#e02a73); }
  .track-knob { position: absolute; top: 50%; transform: translate(-50%,-50%); width: 20px; height: 20px; border-radius: 10px; background: #fff; border: 2px solid #ff6aa9; box-shadow: 0 3px 8px rgba(214,40,110,0.35); }
  .age-summary { display: flex; align-items: center; gap: 7px; justify-content: center; font-size: 12.5px; color: rgba(33,22,51,0.6); }
  .age-strong { font-weight: 700; color: #211633; }
</style>
</head>
<body>
  <h1>LevelDots &amp; AgeRange</h1>
  <p class="subtitle">Progression de niveaux (Rencontre/Amitié) et sélecteur de tranche d'âge.</p>

  <div class="section-title">LevelDots</div>
  <div style="max-width:320px">
    <div class="card">
      <div class="dots-row">
        <!-- Level 1 / 5 rose -->
        <div class="level-row-outer">
          <div>
            <div class="dots" style="--accent:#d6286e">
              <div class="dot dot-on"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div>
            </div>
            <div class="level-lbl" style="color:#d6286e">1 / 5 — Inconnus</div>
          </div>
          <span class="level-name">Mode Rencontre</span>
        </div>
        <!-- Level 3 / 5 teal -->
        <div class="level-row-outer">
          <div>
            <div class="dots" style="--accent:#2f9aa8">
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div><div class="bar bar-off"></div>
              <div class="dot dot-off"></div>
            </div>
            <div class="level-lbl" style="color:#2f9aa8">3 / 5 — Amis</div>
          </div>
          <span class="level-name">Mode Amitié</span>
        </div>
        <!-- Level 5 / 5 violet -->
        <div class="level-row-outer">
          <div>
            <div class="dots" style="--accent:#a463ff">
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div><div class="bar bar-on"></div>
              <div class="dot dot-on"></div>
            </div>
            <div class="level-lbl" style="color:#a463ff">5 / 5 — Légendaire</div>
          </div>
          <span class="level-name">Max</span>
        </div>
      </div>
    </div>
  </div>

  <div class="section-title">AgeRange</div>
  <div class="age-card">
    <div class="age-values">
      <div class="stepper">
        <span class="step-label">Âge minimum</span>
        <div class="step-row">
          <div class="step-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b01b5c" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
          </div>
          <span class="step-val">22</span>
          <div class="step-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b01b5c" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </div>
        </div>
      </div>
      <div class="sep">—</div>
      <div class="stepper">
        <span class="step-label">Âge maximum</span>
        <div class="step-row">
          <div class="step-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b01b5c" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
          </div>
          <span class="step-val">35</span>
          <div class="step-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b01b5c" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </div>
        </div>
      </div>
    </div>
    <div class="track-wrap">
      <div class="track-fill" style="left:23.3%;width:32.2%"></div>
      <div class="track-knob" style="left:23.3%"></div>
      <div class="track-knob" style="left:55.5%"></div>
    </div>
    <div class="age-summary">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#d6286e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Profils de <span class="age-strong">22</span> à <span class="age-strong">35</span> ans</span>
    </div>
  </div>
</body>
</html>
