<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kady — Avatar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(160deg, #ffffff 0%, #faf7fe 60%, #f6f2fb 100%);
    min-height: 100vh; padding: 40px 32px; color: #211633;
  }
  h1 { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6E6A7D; margin-bottom: 36px; }
  .section-title { font-weight: 600; font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; color: #6E6A7D; margin-bottom: 20px; margin-top: 32px; }
  .section-title:first-of-type { margin-top: 0; }
  .row { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .lbl { font-size: 11px; color: #6E6A7D; font-weight: 600; }

  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
  .initial { font-family: 'Sora', sans-serif; font-weight: 600; }
  .ring-wrap { border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .ring-inner { background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; padding: 3px; }

  /* Stack */
  .stack { display: flex; flex-direction: row; align-items: center; }
  .stack-item { border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; }
</style>
</head>
<body>
  <h1>Avatar</h1>
  <p class="subtitle">Initiales colorées, anneau dégradé optionnel, état verrouillé.</p>

  <div class="section-title">Tailles — initiales</div>
  <div class="row">
    <div class="col">
      <div class="avatar" style="width:32px;height:32px;background:#d34d7e22">
        <span class="initial" style="font-size:13px;color:#d34d7e">A</span>
      </div>
      <span class="lbl">32px</span>
    </div>
    <div class="col">
      <div class="avatar" style="width:48px;height:48px;background:#7a4fd622">
        <span class="initial" style="font-size:19px;color:#7a4fd6">M</span>
      </div>
      <span class="lbl">48px (défaut)</span>
    </div>
    <div class="col">
      <div class="avatar" style="width:64px;height:64px;background:#2f9aa822">
        <span class="initial" style="font-size:26px;color:#2f9aa8">S</span>
      </div>
      <span class="lbl">64px</span>
    </div>
    <div class="col">
      <div class="avatar" style="width:80px;height:80px;background:#ff9d5c22">
        <span class="initial" style="font-size:32px;color:#ff9d5c">K</span>
      </div>
      <span class="lbl">80px</span>
    </div>
  </div>

  <div class="section-title">Anneau dégradé</div>
  <div class="row">
    <div class="col">
      <div class="ring-wrap" style="background:linear-gradient(135deg,#ff6aa9,#e02a73);width:62px;height:62px;">
        <div class="ring-inner">
          <div class="avatar" style="width:48px;height:48px;background:#d34d7e22">
            <span class="initial" style="font-size:19px;color:#d34d7e">L</span>
          </div>
        </div>
      </div>
      <span class="lbl">rose (actif)</span>
    </div>
    <div class="col">
      <div class="ring-wrap" style="background:linear-gradient(135deg,#b07bff,#7a4fd6);width:62px;height:62px;">
        <div class="ring-inner">
          <div class="avatar" style="width:48px;height:48px;background:#7a4fd622">
            <span class="initial" style="font-size:19px;color:#7a4fd6">J</span>
          </div>
        </div>
      </div>
      <span class="lbl">royal (premium)</span>
    </div>
    <div class="col">
      <div class="ring-wrap" style="background:linear-gradient(135deg,#7be0a0,#2f9ac2);width:62px;height:62px;">
        <div class="ring-inner">
          <div class="avatar" style="width:48px;height:48px;background:#2f9aa822">
            <span class="initial" style="font-size:19px;color:#2f9aa8">T</span>
          </div>
        </div>
      </div>
      <span class="lbl">ocean</span>
    </div>
  </div>

  <div class="section-title">État verrouillé</div>
  <div class="row">
    <div class="col">
      <div class="avatar" style="width:56px;height:56px;background:#a463ff22;position:relative;">
        <span class="initial" style="font-size:22px;color:#a463ff">R</span>
        <div style="position:absolute;inset:0;background:rgba(20,12,40,0.5);border-radius:50%;display:flex;align-items:center;justify-content:center;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>
      <span class="lbl">locked</span>
    </div>
  </div>

  <div class="section-title">AvatarStack</div>
  <div class="row">
    <div class="col">
      <div class="stack">
        <div class="stack-item" style="width:28px;height:28px;background:#d34d7e33;z-index:4">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:11px;color:#d34d7e">A</span>
        </div>
        <div class="stack-item" style="width:28px;height:28px;background:#7a4fd633;margin-left:-9px;z-index:3">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:11px;color:#7a4fd6">M</span>
        </div>
        <div class="stack-item" style="width:28px;height:28px;background:#2f9aa833;margin-left:-9px;z-index:2">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:11px;color:#2f9aa8">S</span>
        </div>
        <div class="stack-item" style="width:28px;height:28px;background:#F4F1FA;margin-left:-9px;z-index:1">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:10px;color:#6E6A7D">+8</span>
        </div>
      </div>
      <span class="lbl">3 membres + 8</span>
    </div>
    <div class="col">
      <div class="stack">
        <div class="stack-item" style="width:36px;height:36px;background:#ff9d5c33;z-index:3">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:14px;color:#ff9d5c">K</span>
        </div>
        <div class="stack-item" style="width:36px;height:36px;background:#5a7fd633;margin-left:-12px;z-index:2">
          <span style="font-family:'Plus Jakarta Sans';font-weight:600;font-size:14px;color:#5a7fd6">D</span>
        </div>
      </div>
      <span class="lbl">size 36</span>
    </div>
  </div>
</body>
</html>
